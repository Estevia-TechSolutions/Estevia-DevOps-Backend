trigger:
  branches:
    include:
      - main

variables:
  azureServiceConnection: 'protrack-azure-sc'
  containerRegistry: 'esteviacoreregistry.azurecr.io'
  imageRepository: 'api-evaops'
  containerAppName: 'api-evaops'
  resourceGroup: 'Estevia-Prod-RG'

stages:
- stage: BuildAndPush
  displayName: 'Build and Push API Image'
  jobs:
  - job: Build
    displayName: 'Build and Push'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm ci
        npm test
      displayName: 'Run tests'

    - task: Docker@2
      displayName: 'Build and Push Image to ACR'
      inputs:
        containerRegistry: 'estevia-acr-sc'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

- stage: DeployToAzure
  displayName: 'Deploy Container App'
  dependsOn: BuildAndPush
  jobs:
  - deployment: Deploy
    displayName: 'Update Azure Container App'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Deploy to Azure Container Apps'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az config set extension.use_dynamic_install=yes_without_prompt
                az containerapp update --container-name web-container \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(containerRegistry)/$(imageRepository):$(Build.BuildId)
