trigger:
  branches:
    include:
      - main

# ============================================================
# PIPELINE CONFIGURATION
# All values below must be set as Azure DevOps pipeline
# variables or linked variable group — do NOT hardcode.
# Required variables:
#   azureServiceConnection  - Azure service connection name
#   containerRegistry       - ACR login server (e.g. myregistry.azurecr.io)
#   acrServiceConnection    - ACR service connection name
#   imageRepository         - Container image repository name
#   containerAppName        - Azure Container App name
#   resourceGroup           - Azure Resource Group name
# ============================================================

variables:
  azureServiceConnection: $(AZURE_SERVICE_CONNECTION)
  containerRegistry: $(CONTAINER_REGISTRY)
  acrServiceConnection: $(ACR_SERVICE_CONNECTION)
  imageRepository: $(IMAGE_REPOSITORY)
  containerAppName: $(CONTAINER_APP_NAME)
  resourceGroup: $(AZURE_RESOURCE_GROUP)

stages:
- stage: BuildAndPush
  displayName: 'Build and Push API Image'
  jobs:
  - job: Build
    displayName: 'Build and Push'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm ci
        npm test
      displayName: 'Run tests'

    - task: Docker@2
      displayName: 'Build and Push Image to ACR'
      inputs:
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

- stage: DeployToAzure
  displayName: 'Deploy Container App'
  dependsOn: BuildAndPush
  jobs:
  - deployment: Deploy
    displayName: 'Update Azure Container App'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Deploy to Azure Container Apps'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az config set extension.use_dynamic_install=yes_without_prompt
                az containerapp update --container-name web-container \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(containerRegistry)/$(imageRepository):$(Build.BuildId)
