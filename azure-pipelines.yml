trigger:
  branches:
    include:
      - main

# ============================================================
# PIPELINE CONFIGURATION
# Infrastructure values are sourced from Azure DevOps pipeline
# variables or a linked variable group. Configure these in:
# Azure DevOps → Pipeline → Edit → Variables
#
# IMPORTANT: Service connection names (marked *literal*) must
# match the actual service connection names defined in
# Azure DevOps → Project Settings → Service connections.
# They cannot be set via pipeline variables — Azure DevOps
# validates them at parse time.
#
# Pipeline variables required:
#   CONTAINER_REGISTRY   - ACR login server (e.g. myacr.azurecr.io)
#   IMAGE_REPOSITORY     - Container image name (e.g. api-evaops)
#   CONTAINER_APP_NAME   - Azure Container App resource name
#   AZURE_RESOURCE_GROUP - Azure Resource Group name
#
# Service connections (*literal* — set in Project Settings):
#   ACR service connection:   estevia-acr-sc
#   Azure service connection: protrack-azure-sc
# ============================================================

variables:
  containerRegistry: $(CONTAINER_REGISTRY)
  imageRepository: $(IMAGE_REPOSITORY)
  containerAppName: $(CONTAINER_APP_NAME)
  resourceGroup: $(AZURE_RESOURCE_GROUP)

stages:
- stage: BuildAndPush
  displayName: 'Build and Push API Image'
  jobs:
  - job: Build
    displayName: 'Build and Push'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm ci
        npm test
      displayName: 'Run tests'

    - task: Docker@2
      displayName: 'Build and Push Image to ACR'
      inputs:
        # Service connection name — must be a literal string (Azure DevOps parse-time validation)
        containerRegistry: 'estevia-acr-sc'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

- stage: DeployToAzure
  displayName: 'Deploy Container App'
  dependsOn: BuildAndPush
  jobs:
  - deployment: Deploy
    displayName: 'Update Azure Container App'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Deploy to Azure Container Apps'
            inputs:
              # Service connection name — must be a literal string (Azure DevOps parse-time validation)
              azureSubscription: 'protrack-azure-sc'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az config set extension.use_dynamic_install=yes_without_prompt
                az containerapp update --container-name web-container \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(containerRegistry)/$(imageRepository):$(Build.BuildId)

