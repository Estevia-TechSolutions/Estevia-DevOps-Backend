trigger:
  branches:
    include:
      - main

# ============================================================
# PIPELINE CONFIGURATION
# Update the variables below if infrastructure names change.
# These are resource identifiers, not secrets.
#
# Actual secrets (DB password, JWT secret, OAuth keys, etc.)
# are managed via Azure DevOps → Pipeline → Variables (secret)
# or Azure Key Vault — never stored in this file.
#
# Service connections are defined in:
# Azure DevOps → Project Settings → Service Connections
# ============================================================

variables:
  # ACR login server — update if registry changes
  containerRegistry: 'esteviacoreregistry.azurecr.io'
  # Docker image name in ACR
  imageRepository: 'api-evaops'
  # Azure Container App resource name
  containerAppName: 'api-evaops'
  # Azure Resource Group containing the Container App
  resourceGroup: 'Estevia-Prod-RG'

stages:
- stage: BuildAndPush
  displayName: 'Build and Push API Image'
  jobs:
  - job: Build
    displayName: 'Build and Push'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm ci
        npm test
      displayName: 'Run tests'

    - task: Docker@2
      displayName: 'Build and Push Image to ACR'
      inputs:
        # Service connection name — literal required (Azure DevOps parse-time validation)
        containerRegistry: 'estevia-acr-sc'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

- stage: DeployToAzure
  displayName: 'Deploy Container App'
  dependsOn: BuildAndPush
  jobs:
  - deployment: Deploy
    displayName: 'Update Azure Container App'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Deploy to Azure Container Apps'
            inputs:
              # Service connection name — literal required (Azure DevOps parse-time validation)
              azureSubscription: 'protrack-azure-sc'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az config set extension.use_dynamic_install=yes_without_prompt
                az containerapp update --container-name api-evaops \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(containerRegistry)/$(imageRepository):$(Build.BuildId)
